<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <meta name="mobile-web-app-capable" content="yes">
    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="S_CALC">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>S_CALC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ============================================================
           BASE / SCROLLBAR
        ============================================================ */
        * { box-sizing: border-box; }

        .scrollbar-custom::-webkit-scrollbar { width: 5px; }
        .scrollbar-custom::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-custom::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 10px; }
        .scrollbar-custom::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hov); }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        /* ============================================================
           TEMAS — Porto Noite (dark) e Porto Dia (light)
           Todas as cores do app passam por variáveis CSS.
        ============================================================ */
        :root, [data-theme="night"] {
            --bg-page:        #020617;
            --bg-panel:       #0f172a;
            --bg-panel-inner: #080d18;
            --bg-display:     #0a0f1e;
            --border-panel:   #1e293b;
            --border-inner:   #1e293b;

            --txt-primary:    #f8fafc;
            --txt-secondary:  #e2e8f0;
            --txt-muted:      #475569;
            --txt-subtle:     #334155;

            --btn-num-bg:     rgba(30,41,59,0.7);
            --btn-num-bg-hov: #334155;
            --btn-num-txt:    #f1f5f9;
            --btn-num-brd:    rgba(71,85,105,0.5);

            --btn-fn-bg:      #1e293b;
            --btn-fn-bg-hov:  #334155;
            --btn-fn-txt:     #94a3b8;
            --btn-fn-brd:     rgba(71,85,105,0.6);

            --btn-op-bg:      rgba(30,27,75,0.6);
            --btn-op-bg-hov:  rgba(49,46,129,0.7);
            --btn-op-txt:     #a5b4fc;
            --btn-op-brd:     rgba(67,56,202,0.4);

            --btn-eq-bg:      #4f46e5;
            --btn-eq-bg-hov:  #4338ca;
            --btn-eq-txt:     #ffffff;

            --btn-ce-bg:      rgba(69,10,10,0.4);
            --btn-ce-bg-hov:  rgba(127,29,29,0.5);
            --btn-ce-txt:     #f87171;
            --btn-ce-brd:     rgba(127,29,29,0.3);

            --mem-txt:        #64748b;
            --mem-bg-hov:     #1e293b;

            --density-brd:    #1e293b;
            --density-txt:    #64748b;
            --density-active-bg:  #4338ca;
            --density-active-txt: #ffffff;
            --density-active-brd: #4338ca;

            --tab-brd:        #1e293b;
            --tab-txt:        #64748b;
            --tab-active-bg:  #1e293b;
            --tab-active-txt: #e2e8f0;
            --tab-active-brd: #334155;
            --tab-indicator:  #6366f1;

            --op-field-brd:   #0f172a;
            --op-editable-bg: rgba(99,102,241,0.06);
            --op-editable-brd:#6366f1;
            --op-editable-lbl:#818cf8;
            --op-editable-inp:#a5b4fc;
            --op-result-bg:   rgba(16,185,129,0.05);
            --op-result-brd:  #10b981;
            --op-result-lbl:  #34d399;
            --op-result-val:  #6ee7b7;
            --op-placeholder: #334155;
            --op-section-txt: #334155;
            --op-section-bg:  rgba(0,0,0,0.25);
            --op-subval:      #475569;
            --op-mode-brd:    #1e293b;
            --op-mode-txt:    #475569;
            --op-mode-act-bg: #1e1b4b;
            --op-mode-act-txt:#a5b4fc;
            --op-mode-act-brd:#4338ca;
            --op-clear-brd:   #1e293b;
            --op-clear-txt:   #475569;

            --hist-title:     #e2e8f0;
            --hist-import-c:  #34d399;
            --hist-del-c:     #f87171;
            --hist-hover-bg:  #1e293b;
            --hist-item-brd:  #1e293b;
            --hist-time:      #334155;
            --hist-math:      #cbd5e1;
            --hist-empty:     #475569;
            --hist-btn-bg:    #1e293b;
            --hist-btn-brd:   #334155;
            --hist-btn-txt:   #cbd5e1;
            --hist-btn-hov:   #334155;

            --scrollbar-thumb:#334155;
            --scrollbar-hov:  #475569;

            --shadow-panel:   rgba(0,0,0,0.6);
        }

        [data-theme="day"] {
            --bg-page:        #E8F0F7;
            --bg-panel:       #F4F7FA;
            --bg-panel-inner: #EAEEF3;
            --bg-display:     #FFFFFF;
            --border-panel:   #C8D6E5;
            --border-inner:   #D1DCE8;

            --txt-primary:    #1E293B;
            --txt-secondary:  #1E293B;
            --txt-muted:      #64748B;
            --txt-subtle:     #94A3B8;

            --btn-num-bg:     #FFFFFF;
            --btn-num-bg-hov: #F1F5F9;
            --btn-num-txt:    #1E293B;
            --btn-num-brd:    #C8D6E5;

            --btn-fn-bg:      #EEF2F7;
            --btn-fn-bg-hov:  #E2E8F0;
            --btn-fn-txt:     #475569;
            --btn-fn-brd:     #C8D6E5;

            --btn-op-bg:      #EEF2FF;
            --btn-op-bg-hov:  #E0E7FF;
            --btn-op-txt:     #3730A3;
            --btn-op-brd:     #C7D2FE;

            --btn-eq-bg:      #4338CA;
            --btn-eq-bg-hov:  #3730A3;
            --btn-eq-txt:     #FFFFFF;

            --btn-ce-bg:      #FEF2F2;
            --btn-ce-bg-hov:  #FEE2E2;
            --btn-ce-txt:     #DC2626;
            --btn-ce-brd:     #FECACA;

            --mem-txt:        #94A3B8;
            --mem-bg-hov:     #E2E8F0;

            --density-brd:    #C8D6E5;
            --density-txt:    #64748B;
            --density-active-bg:  #4338CA;
            --density-active-txt: #FFFFFF;
            --density-active-brd: #4338CA;

            --tab-brd:        #C8D6E5;
            --tab-txt:        #94A3B8;
            --tab-active-bg:  #FFFFFF;
            --tab-active-txt: #1E293B;
            --tab-active-brd: #C8D6E5;
            --tab-indicator:  #4338CA;

            --op-field-brd:   #E2E8F0;
            --op-editable-bg: rgba(67,56,202,0.05);
            --op-editable-brd:#4338CA;
            --op-editable-lbl:#4338CA;
            --op-editable-inp:#1E293B;
            --op-result-bg:   rgba(5,150,105,0.05);
            --op-result-brd:  #059669;
            --op-result-lbl:  #059669;
            --op-result-val:  #065F46;
            --op-placeholder: #94A3B8;
            --op-section-txt: #94A3B8;
            --op-section-bg:  rgba(200,214,229,0.3);
            --op-subval:      #94A3B8;
            --op-mode-brd:    #C8D6E5;
            --op-mode-txt:    #94A3B8;
            --op-mode-act-bg: #EEF2FF;
            --op-mode-act-txt:#3730A3;
            --op-mode-act-brd:#4338CA;
            --op-clear-brd:   #C8D6E5;
            --op-clear-txt:   #94A3B8;

            --hist-title:     #1E293B;
            --hist-import-c:  #059669;
            --hist-del-c:     #DC2626;
            --hist-hover-bg:  #E2E8F0;
            --hist-item-brd:  #D1DCE8;
            --hist-time:      #94A3B8;
            --hist-math:      #1E293B;
            --hist-empty:     #94A3B8;
            --hist-btn-bg:    #FFFFFF;
            --hist-btn-brd:   #C8D6E5;
            --hist-btn-txt:   #475569;
            --hist-btn-hov:   #F1F5F9;

            --scrollbar-thumb:#C8D6E5;
            --scrollbar-hov:  #94A3B8;

            --shadow-panel:   rgba(100,116,139,0.15);
        }


        /* ============================================================
           LAYOUT PRINCIPAL
           Calculadora: largura fixa no centro
           Histórico: painel lateral expansível
        ============================================================ */
        body {
            background: var(--bg-page);
            color: var(--txt-primary);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 2rem 1rem;
            padding-left: max(1rem, env(safe-area-inset-left));
            padding-right: max(1rem, env(safe-area-inset-right));
            padding-bottom: max(1rem, env(safe-area-inset-bottom));
            font-family: ui-sans-serif, system-ui, sans-serif;
            /* fix 3: trava scroll horizontal no Safari */
            overflow-x: hidden;
        }

        /* Container raiz — flex linha */
        #app {
            display: flex;
            align-items: flex-start;
            gap: 1.25rem;
            width: 100%;
            max-width: 1100px;
            /* fix 3: impede que #app exceda a viewport */
            max-width: min(1100px, 100vw);
        }

        /* Calculadora: largura fixa, centralizada */
        #calc-wrapper {
            flex: 0 0 360px;
            width: 360px;
            background: var(--bg-panel);
            border: 1px solid var(--border-panel);
            border-radius: 1.75rem;
            padding: 1.25rem;
            box-shadow: 0 25px 50px var(--shadow-panel);
            display: flex;
            flex-direction: column;
            transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
        }

        /* Histórico: cresce para ocupar o restante */
        #history-panel {
            flex: 1 1 0;
            min-width: 0;
            background: var(--bg-panel);
            border: 1px solid var(--border-panel);
            border-radius: 1.75rem;
            padding: 1.25rem;
            box-shadow: 0 25px 50px var(--shadow-panel);
            display: flex;
            flex-direction: column;
            transition: background 0.3s, border-color 0.3s;
            /* altura vinculada à calculadora via JS */
        }

        /* Em telas pequenas: empilha verticalmente */
        @media (max-width: 700px) {
            #app { flex-direction: column; }
            #calc-wrapper { flex: none; width: 100%; max-width: 400px; align-self: center; }
            #history-panel { width: 100%; }
        }

        /* ============================================================
           VISOR — fonte adaptativa como calculadora física
        ============================================================ */
        #display-area {
            background: var(--bg-display);
            border: 1px solid var(--border-panel);
            border-radius: 1rem;
            padding: 0.75rem 1rem 0.85rem;
            margin-bottom: 0.85rem;
            text-align: right;
            min-height: 88px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            overflow: hidden;
        }
        #previous-operand {
            font-size: 0.78rem;
            color: var(--txt-muted);
            font-weight: 500;
            min-height: 1.1rem;
            letter-spacing: 0.03em;
            margin-bottom: 0.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #current-operand {
            /* fonte começa grande e encolhe conforme o número cresce */
            font-size: clamp(1.4rem, 8vw, 2.6rem);
            font-weight: 300;
            color: var(--txt-primary);
            letter-spacing: -0.02em;
            line-height: 1.15;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            /* garante que nunca estoure o container */
            max-width: 100%;
            display: block;
            transition: font-size 0.12s ease;
        }

        /* ============================================================
           DENSIDADE
        ============================================================ */
        :root {
            --btn-py: 0.7rem;
            --btn-fs: 0.92rem;
            --btn-num-fs: 1.05rem;
            --btn-op-fs: 1.2rem;
            --btn-eq-fs: 1.2rem;
            --gap: 0.4rem;
            --mem-py: 0.3rem;
        }
        [data-density="compact"] {
            --btn-py: 0.32rem; --btn-fs: 0.75rem; --btn-num-fs: 0.82rem;
            --btn-op-fs: 0.9rem; --btn-eq-fs: 0.9rem; --gap: 0.22rem; --mem-py: 0.18rem;
        }
        [data-density="comfortable"] {
            --btn-py: 1rem; --btn-fs: 1rem; --btn-num-fs: 1.2rem;
            --btn-op-fs: 1.35rem; --btn-eq-fs: 1.35rem; --gap: 0.55rem; --mem-py: 0.5rem;
        }


        /* ============================================================
           FIX iOS Safari — sem zoom duplo toque, sem delay 300ms
        ============================================================ */
        button, input, select {
            touch-action: manipulation;
        }

        /* ============================================================
           RIPPLE + PRESS
        ============================================================ */
        .btn-ripple { position: relative; overflow: hidden; }
        .btn-ripple::after {
            content:''; position:absolute; inset:0; border-radius:inherit;
            background: radial-gradient(circle, rgba(255,255,255,0.32) 0%, transparent 70%);
            opacity:0; transform:scale(0); pointer-events:none;
            transition: transform 0s, opacity 0s;
        }
        .btn-ripple:active::after {
            transform:scale(2.5); opacity:1;
            transition: transform 0.18s ease-out, opacity 0.18s ease-out;
        }

        /* Botões calculadora */
        .calc-btn {
            padding-top:var(--btn-py); padding-bottom:var(--btn-py); font-size:var(--btn-fs);
            transition: background-color 0.12s, padding 0.22s ease, font-size 0.22s ease, transform 0.1s ease, box-shadow 0.1s ease;
            cursor: pointer;
        }
        .calc-btn:active { transform:scale(0.87); box-shadow:0 0 0 2px rgba(99,102,241,.35); }

        .calc-btn-num {
            padding-top:var(--btn-py); padding-bottom:var(--btn-py); font-size:var(--btn-num-fs);
            transition: background-color 0.12s, padding 0.22s ease, font-size 0.22s ease, transform 0.1s ease, box-shadow 0.1s ease;
            cursor: pointer;
        }
        .calc-btn-num:active { transform:scale(0.87); box-shadow:0 0 0 2px rgba(99,102,241,.35); }

        .calc-btn-op {
            padding-top:var(--btn-py); padding-bottom:var(--btn-py); font-size:var(--btn-op-fs);
            transition: background-color 0.12s, padding 0.22s ease, font-size 0.22s ease, transform 0.1s ease, box-shadow 0.1s ease;
            cursor: pointer;
        }
        .calc-btn-op:active { transform:scale(0.87); box-shadow:0 0 0 2px rgba(99,102,241,.55); }

        .calc-btn-eq {
            padding-top:var(--btn-py); padding-bottom:var(--btn-py); font-size:var(--btn-eq-fs);
            transition: background-color 0.12s, padding 0.22s ease, font-size 0.22s ease, transform 0.12s ease, box-shadow 0.12s ease;
            cursor: pointer;
        }
        .calc-btn-eq:active { transform:scale(0.84); box-shadow:0 0 0 3px rgba(99,102,241,.7); }

        .calc-grid { gap:var(--gap); transition:gap 0.22s ease; }

        .mem-btn {
            padding-top:var(--mem-py); padding-bottom:var(--mem-py); font-size:var(--btn-fs);
            transition: padding 0.22s ease, font-size 0.22s ease, transform 0.1s ease, box-shadow 0.1s ease;
            cursor: pointer;
        }
        .mem-btn:active:not(:disabled) { transform:scale(0.85); box-shadow:0 0 0 2px rgba(99,102,241,.4); }

        .density-btn { transition: all 0.18s; cursor: pointer; }
        .density-btn:active { transform:scale(0.90); }
        .density-btn.active { background-color:var(--density-active-bg); color:var(--density-active-txt); border-color:var(--density-active-brd); }

        /* ============================================================
           ABAS DE MODO (Calculadora / Operação)
        ============================================================ */
        .mode-tab {
            flex:1; padding:0.45rem 0.6rem; font-size:0.74rem; font-weight:600;
            border-radius:0.55rem; border:1px solid var(--tab-brd); color:var(--tab-txt);
            transition:all 0.18s; cursor:pointer; background:transparent;
            position:relative; overflow:hidden; white-space:nowrap;
        }
        .mode-tab:active { transform:scale(0.96); }
        .mode-tab.active { background:var(--tab-active-bg); color:var(--tab-active-txt); border-color:var(--tab-active-brd); }
        .mode-tab.active::after {
            content:''; position:absolute; bottom:0; left:20%; right:20%; height:2px;
            background:var(--tab-indicator); border-radius:2px 2px 0 0;
        }

        /* ============================================================
           MÓDULO TEMPO DE OPERAÇÃO
        ============================================================ */
        .op-field {
            display:flex; flex-direction:column; gap:0.2rem;
            padding:0.6rem 0.8rem;
            border-bottom:1px solid var(--op-field-brd);
            transition: background 0.12s;
        }
        .op-field:last-child { border-bottom:none; }
        .op-field label {
            font-size:0.65rem; font-weight:700; color:var(--txt-muted);
            text-transform:uppercase; letter-spacing:0.06em;
        }
        .op-field input {
            background:transparent; border:none; outline:none;
            color:var(--txt-secondary); font-size:0.9rem; font-weight:500; width:100%; padding:0;
        }
        /* datetime-local: alinha visualmente com os outros campos */
        .op-field input[type="datetime-local"] {
            color-scheme: dark;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--txt-secondary);
            width: 100%;
            padding: 0;
            margin: 0;
            -webkit-appearance: none;
            appearance: none;
        }
        [data-theme="day"] .op-field input[type="datetime-local"] {
            color-scheme: light;
        }

        .op-field input::placeholder { color:var(--op-placeholder); }
        .op-field input:focus { color:var(--op-editable-inp); }
        .op-field.editable { background:var(--op-editable-bg); border-left:2px solid var(--op-editable-brd); }
        .op-field.editable label { color:var(--op-editable-lbl); }
        .op-field.editable input { color:var(--op-editable-inp); }
        .op-field.result-field { background:var(--op-result-bg); border-left:2px solid var(--op-result-brd); }
        .op-field.result-field label { color:var(--op-result-lbl); }
        .result-value { font-size:0.92rem; font-weight:600; color:var(--op-result-val); min-height:1.3rem; }
        .op-field .sub-value { font-size:0.7rem; color:var(--op-subval); margin-top:0.05rem; }
        .op-section-label {
            font-size:0.6rem; font-weight:700; color:var(--op-section-txt);
            text-transform:uppercase; letter-spacing:0.08em;
            padding:0.4rem 0.8rem 0.15rem; background:var(--op-section-bg);
        }
        .calc-mode-btn {
            flex:1; padding:0.35rem 0.4rem; font-size:0.66rem; font-weight:600;
            border-radius:0.45rem; border:1px solid var(--op-mode-brd); color:var(--op-mode-txt);
            background:transparent; transition:all 0.18s; cursor:pointer; white-space:nowrap;
        }
        .calc-mode-btn:active { transform:scale(0.93); }
        .calc-mode-btn.active { background:var(--op-mode-act-bg); color:var(--op-mode-act-txt); border-color:var(--op-mode-act-brd); }
        .op-calc-btn {
            width:100%; padding:0.65rem; font-size:0.85rem; font-weight:700;
            border-radius:0.7rem; border:none; cursor:pointer;
            background:linear-gradient(135deg,#4f46e5,#6366f1); color:white;
            transition:all 0.15s; box-shadow:0 4px 15px rgba(99,102,241,.3);
        }
        .op-calc-btn:hover { filter:brightness(1.1); transform:translateY(-1px); }
        .op-calc-btn:active { transform:scale(0.96); box-shadow:0 0 0 3px rgba(99,102,241,.5); }
        .op-clear-btn {
            width:100%; padding:0.4rem; font-size:0.72rem; font-weight:600;
            border-radius:0.55rem; border:1px solid var(--op-clear-brd); cursor:pointer;
            background:transparent; color:var(--op-clear-txt); transition:all 0.12s;
        }
        .op-clear-btn:hover { border-color:#ef4444; color:#f87171; background:rgba(239,68,68,.07); }
        .op-clear-btn:active { transform:scale(0.96); }

        @keyframes resultPop { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:none} }
        .result-animate { animation:resultPop 0.22s ease-out; }
        .op-error { color:#f87171 !important; font-size:0.78rem !important; font-weight:600 !important; }

        /* ============================================================
           HISTÓRICO — itens com texto quebrado corretamente
        ============================================================ */
        #history-list li {
            word-break: break-word;
        }
        /* Scroll suave no iOS */
        #history-list {
            -webkit-overflow-scrolling: touch;
        }

        /* botões do histórico */
        .hist-action-btn {
            display: flex; align-items: center; justify-content: center; gap: 0.4rem;
            background: var(--hist-btn-bg); border: 1px solid var(--hist-btn-brd);
            color: var(--hist-btn-txt); border-radius: 0.5rem;
            padding: 0.5rem 0.75rem; font-size: 0.75rem; font-weight: 600;
            cursor: pointer; transition: all 0.15s; white-space: nowrap;
        }
        .hist-action-btn:hover { background: var(--hist-btn-hov); color: var(--hist-math); }
        .hist-action-btn:active { transform: scale(0.95); }

        /* ============================================================
           TOGGLE DE TEMA — estilo switch iPhone
        ============================================================ */
        .theme-toggle-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }
        .theme-toggle-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--txt-muted);
            transition: color 0.25s;
            min-width: 2.8rem;
            user-select: none;
        }
        .theme-toggle-label.active-label {
            color: var(--txt-secondary);
        }
        /* O track (fundo do switch) */
        .theme-switch {
            position: relative;
            width: 3.2rem;
            height: 1.75rem;
            flex-shrink: 0;
            cursor: pointer;
        }
        .theme-switch input {
            opacity: 0;
            width: 0;
            height: 0;
            position: absolute;
        }
        .theme-track {
            position: absolute;
            inset: 0;
            border-radius: 999px;
            background: #334155;
            transition: background 0.28s ease;
            border: 1px solid #475569;
        }
        /* Modo DIA: track azul claro */
        .theme-switch input:checked ~ .theme-track {
            background: #93C5FD;
            border-color: #60A5FA;
        }
        /* O thumb (bolinha) */
        .theme-track::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 1.2rem;
            height: 1.2rem;
            border-radius: 50%;
            background: #ffffff;
            box-shadow: 0 1px 4px rgba(0,0,0,0.35);
            transition: transform 0.28s cubic-bezier(.4,0,.2,1), background 0.28s;
        }
        .theme-switch input:checked ~ .theme-track::after {
            transform: translateX(1.45rem);
            background: #1D4ED8;
        }
        /* Ícone dentro do thumb — ☀ / 🌙 via content */
        .theme-icon {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.7rem;
            line-height: 1;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .theme-icon-moon { left: 0.32rem; opacity: 1; }
        .theme-icon-sun  { right: 0.28rem; opacity: 0; }
        .theme-switch input:checked ~ .theme-track .theme-icon-moon { opacity: 0; }
        .theme-switch input:checked ~ .theme-track .theme-icon-sun  { opacity: 1; }

        /* ============================================================
           BADGE DE VERSÃO
        ============================================================ */
        #version-badge {
            text-align: center;
            font-size: 0.62rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            color: var(--txt-subtle);
            padding: 0.35rem 0;
            margin-top: 0.5rem;
            opacity: 0.7;
            user-select: none;
        }
    </style>
</head>
<body>

<div id="app">

    <!-- ================================================================
         CALCULADORA (largura fixa)
    ================================================================ -->
    <div id="calc-wrapper" data-density="standard">

        <!-- Abas de modo -->
        <div class="flex gap-1.5 mb-3">
            <button class="mode-tab active btn-ripple" id="tab-basic" onclick="switchMode('basic')">🧮 Calculadora</button>
            <button class="mode-tab btn-ripple" id="tab-op" onclick="switchMode('op')">⏱ Operação</button>
        </div>


        <!-- Seletor de tema DIA / NOITE -->
        <div class="theme-toggle-wrap">
            <span class="theme-toggle-label" id="lbl-night">NOITE</span>
            <label class="theme-switch" title="Alternar tema">
                <input type="checkbox" id="theme-toggle" onchange="setTheme(this.checked ? 'day' : 'night')">
                <div class="theme-track">
                    <span class="theme-icon theme-icon-moon">🌙</span>
                    <span class="theme-icon theme-icon-sun">☀️</span>
                </div>
            </label>
            <span class="theme-toggle-label" id="lbl-day">DIA</span>
        </div>

        <!-- ── PAINEL CALCULADORA ── -->
        <div id="calc-panel" class="flex flex-col">

            <!-- Visor -->
            <div id="display-area">
                <div id="previous-operand"></div>
                <span id="current-operand">0</span>
            </div>

            <!-- Densidade -->
            <div class="flex items-center gap-1.5 mb-2.5">
                <span style="font-size:0.65rem;color:var(--txt-muted);font-weight:600;white-space:nowrap">Layout:</span>
                <button onclick="setDensity('compact')" id="density-compact"
                    class="density-btn btn-ripple flex-1 py-1 px-1 text-xs font-semibold rounded-lg" style="border:1px solid var(--density-brd);color:var(--density-txt)">Compacto</button>
                <button onclick="setDensity('standard')" id="density-standard"
                    class="density-btn btn-ripple active flex-1 py-1 px-1 text-xs font-semibold rounded-lg" style="border:1px solid var(--density-brd);color:var(--density-txt)">Padrão</button>
                <button onclick="setDensity('comfortable')" id="density-comfortable"
                    class="density-btn btn-ripple flex-1 py-1 px-1 text-xs font-semibold rounded-lg" style="border:1px solid var(--density-brd);color:var(--density-txt)">Confortável</button>
            </div>

            <!-- Memória -->
            <div class="calc-grid grid grid-cols-5 mb-2 font-semibold" style="font-size:var(--btn-fs)">
                <button onclick="memoryClear()" class="mem-btn btn-ripple rounded-lg transition-colors disabled:opacity-25 disabled:cursor-default" style="color:var(--mem-txt)" id="btn-mc" disabled>MC</button>
                <button onclick="memoryRecall()" class="mem-btn btn-ripple rounded-lg transition-colors disabled:opacity-25 disabled:cursor-default" style="color:var(--mem-txt)" id="btn-mr" disabled>MR</button>
                <button onclick="memoryAdd()" class="mem-btn btn-ripple rounded-lg transition-colors" style="color:var(--mem-txt)">M+</button>
                <button onclick="memorySubtract()" class="mem-btn btn-ripple rounded-lg transition-colors" style="color:var(--mem-txt)">M-</button>
                <button onclick="memoryStore()" class="mem-btn btn-ripple rounded-lg transition-colors" style="color:var(--mem-txt)">MS</button>
            </div>

            <!-- Teclado -->
            <div class="calc-grid grid grid-cols-4">
                <button onclick="calculatePercentage()" class="calc-btn btn-ripple rounded-xl font-semibold" style="background:var(--btn-fn-bg);color:var(--btn-fn-txt);border:1px solid var(--btn-fn-brd)">%</button>
                <button onclick="clearEntry()" class="calc-btn btn-ripple rounded-xl font-semibold" style="background:var(--btn-ce-bg);color:var(--btn-ce-txt);border:1px solid var(--btn-ce-brd)">CE</button>
                <button onclick="clearAll()" class="calc-btn btn-ripple rounded-xl font-semibold" style="background:var(--btn-ce-bg);color:var(--btn-ce-txt);border:1px solid var(--btn-ce-brd)">C</button>
                <button onclick="deleteNumber()" class="calc-btn btn-ripple rounded-xl font-semibold flex justify-center items-center" style="background:var(--btn-fn-bg);color:var(--btn-fn-txt);border:1px solid var(--btn-fn-brd)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M5.83 5.146a.5.5 0 0 0 0 .708L7.975 8l-2.147 2.146a.5.5 0 0 0 .704.708l2.147-2.147 2.146 2.147a.5.5 0 0 0 .707-.708L9.39 8l2.146-2.146a.5.5 0 0 0-.707-.708L8.683 7.293 6.536 5.146a.5.5 0 0 0-.707 0z"/>
                        <path d="M13.683 1a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-7.08a2 2 0 0 1-1.519-.698L.241 8.65a1 1 0 0 1 0-1.302L5.084 1.7A2 2 0 0 1 6.603 1h7.08zm-7.08 1a1 1 0 0 0-.76.35L1.06 8l4.784 5.65a1 1 0 0 0 .76.35h7.08a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1h-7.08z"/>
                    </svg>
                </button>

                <button onclick="singleOperation('1/x')" class="calc-btn btn-ripple rounded-xl font-semibold" style="background:var(--btn-fn-bg);color:var(--btn-fn-txt);border:1px solid var(--btn-fn-brd)">¹/x</button>
                <button onclick="singleOperation('x2')" class="calc-btn btn-ripple rounded-xl font-semibold" style="background:var(--btn-fn-bg);color:var(--btn-fn-txt);border:1px solid var(--btn-fn-brd)">x²</button>
                <button onclick="singleOperation('sqrt')" class="calc-btn btn-ripple rounded-xl font-semibold" style="background:var(--btn-fn-bg);color:var(--btn-fn-txt);border:1px solid var(--btn-fn-brd)">√x</button>
                <button onclick="chooseOperation('/')" class="calc-btn-op btn-ripple rounded-xl font-bold" style="background:var(--btn-op-bg);color:var(--btn-op-txt);border:1px solid var(--btn-op-brd)">÷</button>

                <button onclick="appendNumber('7')" class="calc-btn-num btn-ripple rounded-xl font-semibold" style="background:var(--btn-num-bg);color:var(--btn-num-txt);border:1px solid var(--btn-num-brd)">7</button>
                <button onclick="appendNumber('8')" class="calc-btn-num btn-ripple rounded-xl font-semibold" style="background:var(--btn-num-bg);color:var(--btn-num-txt);border:1px solid var(--btn-num-brd)">8</button>
                <button onclick="appendNumber('9')" class="calc-btn-num btn-ripple rounded-xl font-semibold" style="background:var(--btn-num-bg);color:var(--btn-num-txt);border:1px solid var(--btn-num-brd)">9</button>
                <button onclick="chooseOperation('*')" class="calc-btn-op btn-ripple rounded-xl font-bold" style="background:var(--btn-op-bg);color:var(--btn-op-txt);border:1px solid var(--btn-op-brd)">×</button>

                <button onclick="appendNumber('4')" class="calc-btn-num btn-ripple rounded-xl font-semibold" style="background:var(--btn-num-bg);color:var(--btn-num-txt);border:1px solid var(--btn-num-brd)">4</button>
                <button onclick="appendNumber('5')" class="calc-btn-num btn-ripple rounded-xl font-semibold" style="background:var(--btn-num-bg);color:var(--btn-num-txt);border:1px solid var(--btn-num-brd)">5</button>
                <button onclick="appendNumber('6')" class="calc-btn-num btn-ripple rounded-xl font-semibold" style="background:var(--btn-num-bg);color:var(--btn-num-txt);border:1px solid var(--btn-num-brd)">6</button>
                <button onclick="chooseOperation('-')" class="calc-btn-op btn-ripple rounded-xl font-bold" style="background:var(--btn-op-bg);color:var(--btn-op-txt);border:1px solid var(--btn-op-brd)">-</button>

                <button onclick="appendNumber('1')" class="calc-btn-num btn-ripple rounded-xl font-semibold" style="background:var(--btn-num-bg);color:var(--btn-num-txt);border:1px solid var(--btn-num-brd)">1</button>
                <button onclick="appendNumber('2')" class="calc-btn-num btn-ripple rounded-xl font-semibold" style="background:var(--btn-num-bg);color:var(--btn-num-txt);border:1px solid var(--btn-num-brd)">2</button>
                <button onclick="appendNumber('3')" class="calc-btn-num btn-ripple rounded-xl font-semibold" style="background:var(--btn-num-bg);color:var(--btn-num-txt);border:1px solid var(--btn-num-brd)">3</button>
                <button onclick="chooseOperation('+')" class="calc-btn-op btn-ripple rounded-xl font-bold" style="background:var(--btn-op-bg);color:var(--btn-op-txt);border:1px solid var(--btn-op-brd)">+</button>

                <button onclick="toggleSign()" class="calc-btn-num btn-ripple rounded-xl font-semibold" style="background:var(--btn-num-bg);color:var(--btn-num-txt);border:1px solid var(--btn-num-brd)">+/-</button>
                <button onclick="appendNumber('0')" class="calc-btn-num btn-ripple rounded-xl font-semibold" style="background:var(--btn-num-bg);color:var(--btn-num-txt);border:1px solid var(--btn-num-brd)">0</button>
                <button onclick="appendNumber('.')" class="calc-btn-num btn-ripple rounded-xl font-semibold" style="background:var(--btn-num-bg);color:var(--btn-num-txt);border:1px solid var(--btn-num-brd)">,</button>
                <button onclick="compute()" class="calc-btn-eq btn-ripple rounded-xl font-bold" style="background:var(--btn-eq-bg);color:var(--btn-eq-txt)">=</button>
            </div>
        </div>

        <!-- ── PAINEL TEMPO DE OPERAÇÃO ── -->
        <div id="op-panel" class="hidden flex-col">

            <!-- Seletor de modo -->
            <div class="flex gap-1.5 mb-2.5">
                <button class="calc-mode-btn active btn-ripple" id="opmode-termino" onclick="setOpMode('termino')">📅 Término</button>
                <button class="calc-mode-btn btn-ripple" id="opmode-produt" onclick="setOpMode('produtividade')">📊 Produtividade</button>
                <button class="calc-mode-btn btn-ripple" id="opmode-peso" onclick="setOpMode('peso')">⚖️ Peso</button>
            </div>

            <!-- Campos (estrutura fixa) -->
            <div class="rounded-xl flex flex-col overflow-hidden mb-2.5" style="background:var(--bg-panel-inner);border:1px solid var(--border-inner)">

                <div class="op-section-label">Entrada</div>

                <div class="op-field editable" id="field-inicio">
                    <label>Início da Operação</label>
                    <input type="datetime-local" id="op-inicio" step="60" oninput="opLiveUpdate()">
                </div>

                <div class="op-field editable" id="field-peso">
                    <label id="label-peso">Peso Total (ton)</label>
                    <input type="number" id="op-peso" placeholder="Ex: 63000" min="0" step="any" inputmode="decimal" oninput="opLiveUpdate()">
                    <div class="result-value" id="op-peso-result" style="display:none">—</div>
                </div>

                <div class="op-field editable" id="field-carga">
                    <label>Carregamento Médio p/ hora (ton/h)</label>
                    <input type="number" id="op-carga" placeholder="Ex: 1.166 — deixe vazio p/ calcular" min="0" step="any" inputmode="decimal" oninput="opCargaManual()">
                    <div class="result-value" id="op-carga-result" style="display:none">—</div>
                    <span class="sub-value" id="op-carga-hint">Deixe em branco para calcular com ritmo atual</span>
                </div>

                <!-- Término como ENTRADA (Produtividade / Peso) -->
                <div class="op-field editable" id="field-termino-input" style="display:none">
                    <label>Término da Operação</label>
                    <input type="datetime-local" id="op-termino-input" step="60" oninput="opLiveUpdate()">
                </div>

                <!-- Término como RESULTADO (modo Término) -->
                <div class="op-field result-field" id="field-termino-result">
                    <label>Previsão de Término</label>
                    <div class="result-value" id="op-termino-result">—</div>
                </div>

                <div class="op-section-label">Resultados</div>

                <div class="op-field result-field" id="field-24h">
                    <label>Projeção 24 horas (ton)</label>
                    <div class="result-value" id="op-24h">—</div>
                </div>

                <div class="op-field result-field" id="field-tempo">
                    <label>Tempo de Operação</label>
                    <div class="result-value" id="op-tempo">—</div>
                </div>

            </div>

            <div class="flex flex-col gap-1.5">
                <button class="op-calc-btn btn-ripple" onclick="calcularOperacao()">Calcular</button>
                <button class="op-clear-btn btn-ripple" onclick="limparOperacao()">Limpar campos</button>
            </div>
        </div>


        <!-- Badge de versão -->
        <div id="version-badge">S_CALC v<span id="app-version">—</span></div>

    </div><!-- /calc-wrapper -->

    <!-- ================================================================
         HISTÓRICO (expande para a direita)
    ================================================================ -->
    <div id="history-panel">

        <!-- Cabeçalho -->
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.85rem;flex-shrink:0">
            <h2 style="font-size:0.95rem;font-weight:700;color:var(--hist-title);letter-spacing:-0.01em">Histórico</h2>
            <div style="display:flex;gap:0.5rem;align-items:center">
                <button onclick="triggerImport()" title="Importar" style="padding:0.35rem;border-radius:0.45rem;background:transparent;border:none;color:var(--hist-import-c);cursor:pointer;display:flex;transition:background 0.12s" onmouseover="this.style.background='var(--hist-hover-bg)'" onmouseout="this.style.background='transparent'">
                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
                        <path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708l3-3z"/>
                    </svg>
                </button>
                <button onclick="clearHistory()" title="Limpar tudo" style="padding:0.35rem;border-radius:0.45rem;background:transparent;border:none;color:var(--hist-del-c);cursor:pointer;display:flex;transition:background 0.12s" onmouseover="this.style.background='#1e293b'" onmouseout="this.style.background='transparent'">
                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/>
                        <path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/>
                    </svg>
                </button>
            </div>
        </div>
        <input type="file" id="import-file-input" accept=".txt" class="hidden" onchange="handleFileImport(event)">

        <!-- Lista com scroll -->
        <ul id="history-list" class="scrollbar-custom" style="flex:1;overflow-y:auto;padding-right:0.4rem;margin-bottom:0.85rem;min-height:0"></ul>

        <!-- Exportação -->
        <div style="display:flex;gap:0.5rem;flex-shrink:0;flex-wrap:wrap">
            <button onclick="downloadHistory(false)" class="hist-action-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M5.5 7a.5.5 0 0 0 0 1h5a.5.5 0 0 0 0-1h-5zM5 9.5a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5zm0 2a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 0 1h-2a.5.5 0 0 1-.5-.5z"/>
                    <path d="M9.5 0H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V4.5L9.5 0zm0 1v2.5a1 1 0 0 0 1 1H13v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1h5.5z"/>
                </svg>
                TXT Normal
            </button>
            <button onclick="downloadHistory(true)" class="hist-action-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M10 7v1.076c.54.166 1 .597 1 1.224v2.4c0 .816-.781 1.3-1.5 1.3h-3c-.719 0-1.5-.484-1.5-1.3V9.3c0-.627.46-1.058 1-1.224V7a2 2 0 1 1 4 0zM7 7v1h2V7a1 1 0 0 0-2 0zM6 9.3v2.4c0 .046.042.1.1.1h2.8c.058 0 .1-.054.1-.1V9.3c0-.046-.042-.1-.1-.1H6.1c-.058 0-.1.054-.1.1z"/>
                    <path d="M9.5 0H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V4.5L9.5 0zm0 1v2.5a1 1 0 0 0 1 1H13v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1h5.5z"/>
                </svg>
                TXT Cripto
            </button>
        </div>

    </div><!-- /history-panel -->

</div><!-- /app -->

<script>
// ====================================================================
// SINCRONIZA ALTURA DO HISTÓRICO COM A CALCULADORA
// ====================================================================
function syncHistoryHeight() {
    const calc = document.getElementById('calc-wrapper');
    const hist = document.getElementById('history-panel');
    if (window.innerWidth > 700) {
        hist.style.height = calc.offsetHeight + 'px';
        hist.style.minHeight = '300px';
    } else {
        hist.style.height = '';
        hist.style.minHeight = '280px';
    }
}
// Roda ao carregar e quando a calculadora muda de tamanho (ResizeObserver)
window.addEventListener('load', syncHistoryHeight);
window.addEventListener('resize', syncHistoryHeight);
if (window.ResizeObserver) {
    new ResizeObserver(syncHistoryHeight).observe(document.getElementById('calc-wrapper'));
}

// ====================================================================
// FONTE ADAPTATIVA DO VISOR (como calculadora física)
// ====================================================================
function adaptDisplayFont() {
    const el   = document.getElementById('current-operand');
    const text = el.innerText || '';
    const len  = text.length;
    let size;
    if      (len <= 7)  size = '2.6rem';
    else if (len <= 10) size = '2.1rem';
    else if (len <= 13) size = '1.7rem';
    else if (len <= 16) size = '1.4rem';
    else                size = '1.15rem';
    el.style.fontSize = size;
}

// ====================================================================
// UTILITÁRIO — data/hora local sem depender de toISOString (que é UTC)
// Funciona corretamente no fuso horário do navegador (Brasil UTC-3)
// ====================================================================
function nowLocalISO() {
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    return `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`
         + `T${pad(now.getHours())}:${pad(now.getMinutes())}`;
}

// MODO DE PAINEL
// ====================================================================
let currentMode = 'basic';

function switchMode(mode) {
    currentMode = mode;
    const calcPanel = document.getElementById('calc-panel');
    const opPanel   = document.getElementById('op-panel');
    document.getElementById('tab-basic').classList.toggle('active', mode === 'basic');
    document.getElementById('tab-op').classList.toggle('active', mode === 'op');
    if (mode === 'basic') {
        calcPanel.classList.remove('hidden'); calcPanel.classList.add('flex');
        opPanel.classList.add('hidden');      opPanel.classList.remove('flex');
    } else {
        calcPanel.classList.add('hidden');    calcPanel.classList.remove('flex');
        opPanel.classList.remove('hidden');   opPanel.classList.add('flex');
        const ini = document.getElementById('op-inicio');
        if (!ini.value) {
            ini.value = nowLocalISO();
        }
    }
    setTimeout(syncHistoryHeight, 50);
}

// ====================================================================
// TEMPO DE OPERAÇÃO
// ====================================================================
let opMode = 'termino';
let cargaManualizada = false;
function getEl(id) { return document.getElementById(id); }

function setOpMode(mode) {
    opMode = mode;

    // Botões de modo
    document.querySelectorAll('.calc-mode-btn').forEach(b => b.classList.remove('active'));
    getEl(mode === 'produtividade' ? 'opmode-produt' : 'opmode-' + mode).classList.add('active');

    // Helpers
    const show = id => { const el = getEl(id); if (el) el.style.display = 'block'; };
    const hide = id => { const el = getEl(id); if (el) el.style.display = 'none';  };
    const editable = id => { const el = getEl(id); if (el) { el.classList.remove('result-field'); el.classList.add('editable'); } };
    const result   = id => { const el = getEl(id); if (el) { el.classList.remove('editable'); el.classList.add('result-field'); } };
    const neutral  = id => { const el = getEl(id); if (el) { el.classList.remove('editable','result-field'); } };

    // Campos sempre presentes
    getEl('field-inicio').classList.add('editable');
    result('field-24h');
    result('field-tempo');

    if (mode === 'termino') {
        // Peso: entrada
        show('op-peso'); hide('op-peso-result');
        getEl('op-peso').readOnly = false; getEl('op-peso').placeholder = 'Ex: 63000';
        editable('field-peso');

        // Carga: entrada opcional
        show('op-carga'); hide('op-carga-result');
        getEl('op-carga').readOnly = false;
        getEl('op-carga').placeholder = 'Ex: 1.166 — deixe vazio p/ calcular';
        getEl('op-carga-hint').textContent = 'Deixe em branco para calcular com ritmo atual';
        editable('field-carga');

        // Término: resultado (div)
        hide('field-termino-input');
        show('field-termino-result');

    } else if (mode === 'produtividade') {
        // Peso: entrada
        show('op-peso'); hide('op-peso-result');
        getEl('op-peso').readOnly = false; getEl('op-peso').placeholder = 'Ex: 63000';
        editable('field-peso');

        // Carga: resultado
        hide('op-carga'); getEl('op-carga').value = '';
        show('op-carga-result'); getEl('op-carga-result').textContent = '—';
        getEl('op-carga-hint').textContent = 'Calculado a partir de Início + Término + Peso';
        result('field-carga');

        // Término: entrada (input datetime)
        show('field-termino-input');
        hide('field-termino-result');

    } else if (mode === 'peso') {
        // Peso: resultado
        hide('op-peso'); getEl('op-peso').value = '';
        show('op-peso-result'); getEl('op-peso-result').textContent = '—';
        result('field-peso');

        // Carga: entrada
        show('op-carga'); hide('op-carga-result');
        getEl('op-carga').readOnly = false; getEl('op-carga').placeholder = 'Ex: 1.166';
        getEl('op-carga-hint').textContent = 'Informe a produtividade conhecida';
        editable('field-carga');

        // Término: entrada (input datetime)
        show('field-termino-input');
        hide('field-termino-result');
    }

    limparResultados();
    setTimeout(syncHistoryHeight, 50);
}

function opCargaManual() { cargaManualizada = getEl('op-carga').value.trim() !== ''; opLiveUpdate(); }
function opLiveUpdate()  { calcularOperacao(true); }

function calcularOperacao(silent = false) {
    const inicioVal = getEl('op-inicio').value;
    const inicio    = inicioVal ? new Date(inicioVal) : null;
    const pesoVal   = parseFloat(getEl('op-peso').value);
    const cargaVal  = parseFloat(getEl('op-carga').value);

    function setRes(id, val) {
        const el = getEl(id); if (!el) return;
        el.textContent = val; el.className = 'result-value result-animate';
        setTimeout(() => el.classList.remove('result-animate'), 300);
    }
    function setErr(id, msg) {
        const el = getEl(id); if (!el) return;
        el.textContent = msg; el.className = 'result-value op-error';
    }

    if (opMode === 'termino') {
        if (!inicio || isNaN(inicio.getTime())) { if (!silent) setErr('op-termino-result','Informe o início'); return; }
        if (isNaN(pesoVal) || pesoVal <= 0)      { if (!silent) setErr('op-termino-result','Informe o peso'); return; }
        let carga = cargaVal;
        if (!cargaManualizada || isNaN(carga) || carga <= 0) {
            const dec = (new Date() - inicio) / 3600000;
            if (dec > 0) {
                carga = pesoVal / dec;
                if (!cargaManualizada) getEl('op-carga').placeholder = formatNum(carga,3) + ' (calculado)';
            } else { if (!silent) setErr('op-termino-result','Informe a produtividade'); return; }
        }
        if (isNaN(carga) || carga <= 0) { if (!silent) setErr('op-termino-result','Produtividade inválida'); return; }
        const hTot = pesoVal / carga;
        const {hh,mm} = splitH(hTot);
        const fim = new Date(inicio.getTime() + hTot * 3600000);
        setRes('op-24h', formatNum(carga * 24, 3) + ' ton');
        setRes('op-tempo', `${hh}h ${String(mm).padStart(2,'0')}min`);
        setRes('op-termino-result', fmtDT(fim));
        if (!silent) addToHistory(`⏱ Término | Início: ${fmtDT(inicio)} | Peso: ${formatNum(pesoVal,3)} ton | Prod: ${formatNum(carga,3)} t/h | Tempo: ${hh}h${mm}min | Fim: ${fmtDT(fim)}`);

    } else if (opMode === 'produtividade') {
        const ti = getEl('op-termino-input');
        const tv = ti && ti.value ? new Date(ti.value) : null;
        if (!inicio || isNaN(inicio.getTime()))       { if (!silent) setErr('op-carga-result','Informe o início'); return; }
        if (!tv || isNaN(tv.getTime()))               { if (!silent) setErr('op-carga-result','Informe o término'); return; }
        if (isNaN(pesoVal) || pesoVal <= 0)           { if (!silent) setErr('op-carga-result','Informe o peso'); return; }
        if (tv.getTime() <= inicio.getTime())         { if (!silent) setErr('op-carga-result','Término deve ser após o início'); return; }
        const hTot = (tv - inicio) / 3600000;
        const carga = pesoVal / hTot;
        const {hh,mm} = splitH(hTot);
        setRes('op-carga-result', formatNum(carga,3) + ' ton/h');
        setRes('op-24h', formatNum(carga * 24, 3) + ' ton');
        setRes('op-tempo', `${hh}h ${String(mm).padStart(2,'0')}min`);
        if (!silent) addToHistory(`📊 Produtividade | Início: ${fmtDT(inicio)} | Fim: ${fmtDT(tv)} | Peso: ${formatNum(pesoVal,3)} ton | Prod: ${formatNum(carga,3)} t/h | Tempo: ${hh}h${mm}min`);

    } else if (opMode === 'peso') {
        const ti = getEl('op-termino-input');
        const tv = ti && ti.value ? new Date(ti.value) : null;
        if (!inicio || isNaN(inicio.getTime()))       { if (!silent) setErr('op-peso-result','Informe o início'); return; }
        if (!tv || isNaN(tv.getTime()))               { if (!silent) setErr('op-peso-result','Informe o término'); return; }
        if (isNaN(cargaVal) || cargaVal <= 0)         { if (!silent) setErr('op-peso-result','Informe a produtividade'); return; }
        if (tv.getTime() <= inicio.getTime())         { if (!silent) setErr('op-peso-result','Término deve ser após o início'); return; }
        const hTot = (tv - inicio) / 3600000;
        const peso = cargaVal * hTot;
        const {hh,mm} = splitH(hTot);
        setRes('op-peso-result', formatNum(peso,3) + ' ton');
        setRes('op-24h', formatNum(cargaVal * 24, 3) + ' ton');
        setRes('op-tempo', `${hh}h ${String(mm).padStart(2,'0')}min`);
        if (!silent) addToHistory(`⚖️ Peso | Início: ${fmtDT(inicio)} | Fim: ${fmtDT(tv)} | Prod: ${formatNum(cargaVal,3)} t/h | Peso: ${formatNum(peso,3)} ton`);
    }
}

function limparOperacao() {
    ['op-peso','op-carga','op-termino-input'].forEach(id => {
        const el = getEl(id); if (el) el.value = '';
    });
    cargaManualizada = false; limparResultados();
}
function limparResultados() {
    ['op-24h','op-tempo','op-termino-result','op-carga-result','op-peso-result'].forEach(id => {
        const el = getEl(id); if (el) { el.textContent = '—'; el.className = 'result-value'; }
    });
    getEl('op-carga').placeholder = 'Ex: 1.166 — deixe vazio p/ calcular';
    getEl('op-peso').placeholder  = 'Ex: 63000';
}

function formatNum(n, d = 3) { return n.toLocaleString('pt-BR', {minimumFractionDigits:0, maximumFractionDigits:d}); }
function splitH(h) { return { hh: Math.floor(h), mm: Math.round((h - Math.floor(h)) * 60) }; }
function fmtDT(d) {
    const ds = ['dom','seg','ter','qua','qui','sex','sáb'];
    const p = n => String(n).padStart(2,'0');
    return `${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())} (${ds[d.getDay()]})`;
}

// ====================================================================
// DENSIDADE
// ====================================================================
function setDensity(mode, save = true) {
    document.getElementById('calc-wrapper').setAttribute('data-density', mode);
    document.querySelectorAll('.density-btn').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById('density-' + mode);
    if (btn) btn.classList.add('active');
    if (save) localStorage.setItem('calc_density', mode);
    setTimeout(syncHistoryHeight, 50);
}

// ====================================================================
// CALCULADORA BÁSICA
// ====================================================================
const previousOperandTextElement = document.getElementById('previous-operand');
const currentOperandTextElement  = document.getElementById('current-operand');
const historyListElement         = document.getElementById('history-list');
const btnMc = document.getElementById('btn-mc');
const btnMr = document.getElementById('btn-mr');

let currentOperand    = '0';
let previousOperand   = '';
let operation         = undefined;
let historyEntries    = [];
let memoryValue       = 0;
let memoryHasValue    = false;
let shouldResetScreen = false;

function init() {
    const sh = localStorage.getItem('calc_history');
    if (sh) historyEntries = JSON.parse(sh);
    if (localStorage.getItem('calc_memory_flag') === 'true') {
        memoryValue = parseFloat(localStorage.getItem('calc_memory')) || 0;
        memoryHasValue = true; updateMemoryButtons();
    }
    setDensity(localStorage.getItem('calc_density') || 'standard', false);
    setTheme(localStorage.getItem('calc_theme') || 'night', false);
    updateHistoryUI(); updateDisplay();
    setTimeout(syncHistoryHeight, 80);
}

function updateMemoryButtons() {
    btnMc.disabled = !memoryHasValue; btnMr.disabled = !memoryHasValue;
    localStorage.setItem('calc_memory', memoryValue);
    localStorage.setItem('calc_memory_flag', memoryHasValue);
}
function memoryClear()    { memoryValue=0; memoryHasValue=false; updateMemoryButtons(); }
function memoryRecall()   { if(!memoryHasValue) return; currentOperand=memoryValue.toString(); shouldResetScreen=false; updateDisplay(); }
function memoryAdd()      { memoryValue+=parseFloat(currentOperand)||0; memoryHasValue=true; shouldResetScreen=true; updateMemoryButtons(); updateDisplay(); }
function memorySubtract() { memoryValue-=parseFloat(currentOperand)||0; memoryHasValue=true; shouldResetScreen=true; updateMemoryButtons(); updateDisplay(); }
function memoryStore()    { memoryValue =parseFloat(currentOperand)||0; memoryHasValue=true; shouldResetScreen=true; updateMemoryButtons(); updateDisplay(); }

function clearAll()   { currentOperand='0'; previousOperand=''; operation=undefined; shouldResetScreen=false; updateDisplay(); }
function clearEntry() { currentOperand='0'; shouldResetScreen=false; updateDisplay(); }
function deleteNumber() {
    if (shouldResetScreen) { clearEntry(); return; }
    currentOperand = (currentOperand.length===1||(currentOperand.length===2&&currentOperand.startsWith('-')))
        ? '0' : currentOperand.slice(0,-1);
    updateDisplay();
}
function appendNumber(n) {
    if (shouldResetScreen) { currentOperand=''; shouldResetScreen=false; }
    if (n==='.'&&currentOperand.includes('.')) return;
    currentOperand = (currentOperand==='0'&&n!=='.') ? n : currentOperand+n;
    updateDisplay();
}
function toggleSign() {
    if (!currentOperand||currentOperand==='0') return;
    currentOperand=(parseFloat(currentOperand)*-1).toString(); updateDisplay();
}
function calculatePercentage() {
    if (!currentOperand) return;
    const c=parseFloat(currentOperand);
    const r=(previousOperand!==''&&(operation==='+'||operation==='-'))
        ?(parseFloat(previousOperand)*c)/100 : c/100;
    currentOperand=r.toString(); shouldResetScreen=true; updateDisplay();
}
function singleOperation(type) {
    if (!currentOperand) return;
    const c=parseFloat(currentOperand); let r,expr;
    if(type==='1/x'){if(!c){alert('Divisão por zero');return;} r=1/c; expr=`1/(${getDisplayNumber(c)})`;}
    else if(type==='x2') {r=Math.pow(c,2); expr=`sqr(${getDisplayNumber(c)})`;}
    else if(type==='sqrt'){if(c<0){alert('Entrada inválida');return;} r=Math.sqrt(c); expr=`√(${getDisplayNumber(c)})`;}
    r=parseFloat(r.toPrecision(12));
    addToHistory(`${expr} = ${getDisplayNumber(r)}`);
    currentOperand=r.toString(); shouldResetScreen=true; updateDisplay();
}
function chooseOperation(op) {
    if(!currentOperand&&!previousOperand) return;
    if(!currentOperand){operation=op; updateDisplay(); return;}
    if(previousOperand) computeChained();
    operation=op; previousOperand=currentOperand; currentOperand=''; updateDisplay();
}
function computeChained() {
    const p=parseFloat(previousOperand),c=parseFloat(currentOperand);
    if(isNaN(p)||isNaN(c)) return;
    let r;
    switch(operation){case'+':r=p+c;break;case'-':r=p-c;break;case'*':r=p*c;break;
    case'/':{if(!c){alert('Divisão por zero');return;}r=p/c;break;}default:return;}
    currentOperand=parseFloat(r.toPrecision(12)).toString();
}
function compute(logHistory=true) {
    const p=parseFloat(previousOperand),c=parseFloat(currentOperand);
    if(isNaN(p)||isNaN(c)) return;
    let r;
    switch(operation){case'+':r=p+c;break;case'-':r=p-c;break;case'*':r=p*c;break;
    case'/':{if(!c){alert('Divisão por zero');return;}r=p/c;break;}default:return;}
    r=parseFloat(r.toPrecision(12));
    if(logHistory){
        const sym=operation==='*'?'×':operation==='/'?'÷':operation;
        addToHistory(`${getDisplayNumber(p)} ${sym} ${getDisplayNumber(c)} = ${getDisplayNumber(r)}`);
    }
    currentOperand=r.toString(); operation=undefined; previousOperand=''; shouldResetScreen=true; updateDisplay();
}
function getDisplayNumber(n) {
    if(n===''||n==='-') return n;
    const parts=n.toString().split('.');
    const int=parseFloat(parts[0]), dec=parts[1];
    const intD=isNaN(int)?'0':int.toLocaleString('pt-BR',{maximumFractionDigits:0});
    return dec!==undefined?`${intD},${dec}`:intD;
}
function updateDisplay() {
    currentOperandTextElement.innerText = getDisplayNumber(currentOperand)||'0';
    adaptDisplayFont();
    if(operation!=null){
        const sym=operation==='*'?'×':operation==='/'?'÷':operation;
        previousOperandTextElement.innerText=`${getDisplayNumber(previousOperand)} ${sym}`;
    } else previousOperandTextElement.innerText='';
}

// ====================================================================
// HISTÓRICO
// ====================================================================
function addToHistory(expr) {
    historyEntries.push(`[${new Date().toLocaleString('pt-BR')}] ${expr}`);
    localStorage.setItem('calc_history', JSON.stringify(historyEntries));
    updateHistoryUI();
}
function updateHistoryUI() {
    historyListElement.innerHTML='';
    if(!historyEntries.length){
        historyListElement.innerHTML='<li style="color:var(--hist-empty);font-size:0.82rem;text-align:center;margin-top:2rem;font-style:italic">Nenhum cálculo no histórico.</li>';
        return;
    }
    [...historyEntries].reverse().forEach(entry => {
        const li=document.createElement('li');
        li.style.cssText='border-bottom:1px solid var(--hist-item-brd);padding-bottom:0.6rem;margin-bottom:0.5rem;list-style:none';
        const si=entry.indexOf(']')+1;
        const time=entry.substring(0,si), math=entry.substring(si);
        li.innerHTML=`<span style="color:var(--hist-time);font-size:0.68rem;display:block;margin-bottom:0.2rem;font-weight:600">${time}</span>`
                    +`<span style="color:var(--hist-math);font-size:0.82rem;font-weight:600;word-break:break-word">${math}</span>`;
        historyListElement.appendChild(li);
    });
}
function clearHistory(){ historyEntries=[]; localStorage.removeItem('calc_history'); updateHistoryUI(); }

// ====================================================================
// EXPORTAÇÃO / IMPORTAÇÃO
// ====================================================================
function encryptText(t){try{return btoa(unescape(encodeURIComponent(t))).split('').reverse().join('');}catch(e){return 'Erro';}}
function decryptText(t){try{return decodeURIComponent(escape(atob(t.split('').reverse().join(''))));}catch(e){return null;}}
function downloadHistory(enc){
    if(!historyEntries.length){alert('Histórico vazio!');return;}
    let c=historyEntries.join('\n'),fn='historico_calculadora.txt';
    if(enc){c=encryptText(c);fn='historico_criptografado.txt';}
    const b=new Blob([c],{type:'text/plain;charset=utf-8'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=fn;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(a.href);
}
function triggerImport(){document.getElementById('import-file-input').click();}
function handleFileImport(event){
    const file=event.target.files[0]; if(!file) return;
    const r=new FileReader();
    r.onload=function(e){
        const c=e.target.result; if(!c) return;
        let lines=[];
        if(c.trim().startsWith('[')){lines=c.split('\n').filter(l=>l.trim());}
        else{const d=decryptText(c);lines=(d&&d.trim().startsWith('[')? d:c).split('\n').filter(l=>l.trim());}
        let added=0;
        lines.forEach(l=>{if(!historyEntries.includes(l)){historyEntries.push(l);added++;}});
        if(added>0){localStorage.setItem('calc_history',JSON.stringify(historyEntries));updateHistoryUI();setTimeout(()=>alert(`${added} registro(s) importado(s)!`),50);}
        else alert('Nenhum registro novo encontrado.');
    };
    r.readAsText(file); event.target.value='';
}

// ====================================================================
// TECLADO
// ====================================================================
document.addEventListener('keydown', function(e) {
    if(currentMode!=='basic') return;
    const k=e.key;
    if(/^[0-9]$/.test(k))               {e.preventDefault();appendNumber(k);}
    else if(k==='.'||k===',')            {e.preventDefault();appendNumber('.');}
    else if(['+','-','*','/'].includes(k)){e.preventDefault();chooseOperation(k);}
    else if(k==='Enter'||k==='=')        {e.preventDefault();compute();}
    else if(k==='Backspace')             {e.preventDefault();deleteNumber();}
    else if(k==='Escape')                {e.preventDefault();clearAll();}
    else if(k==='%')                     {e.preventDefault();calculatePercentage();}
});


// ====================================================================
// TEMA — Porto Noite (dark) / Porto Dia (light)
// ====================================================================
function setTheme(theme, save = true) {
    document.documentElement.setAttribute('data-theme', theme);
    const toggle = document.getElementById('theme-toggle');
    if (toggle) toggle.checked = (theme === 'day');
    const lblNight = document.getElementById('lbl-night');
    const lblDay   = document.getElementById('lbl-day');
    if (lblNight) lblNight.classList.toggle('active-label', theme === 'night');
    if (lblDay)   lblDay.classList.toggle('active-label', theme === 'day');
    // Atualiza theme-color da PWA (barra de status iOS)
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.content = theme === 'day' ? '#E8F0F7' : '#020617';
    if (save) localStorage.setItem('calc_theme', theme);
}




init();
</script>

<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => {
            // Aguarda o SW ficar ativo e pergunta a versão
            function askVersion(sw) {
                sw.postMessage({ type: 'GET_VERSION' });
            }
            // Ouve a resposta
            navigator.serviceWorker.addEventListener('message', e => {
                if (e.data && e.data.type === 'VERSION') {
                    const el = document.getElementById('app-version');
                    if (el) el.textContent = e.data.version;
                }
            });
            // O SW pode já estar ativo (cache hit) ou ainda instalando
            if (reg.active) {
                askVersion(reg.active);
            } else {
                const sw = reg.installing || reg.waiting;
                if (sw) {
                    sw.addEventListener('statechange', () => {
                        if (sw.state === 'activated') askVersion(sw);
                    });
                }
            }
        }).catch(err => console.warn('SW:', err));
    });
}
</script>
